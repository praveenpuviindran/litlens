name: LitLens CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: litlens
          POSTGRES_PASSWORD: litlens
          POSTGRES_DB: litlens
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linting
        run: |
          ruff check backend/ frontend/ eval/ tests/
          ruff format --check backend/ frontend/ eval/ tests/

      - name: Run type checking
        run: mypy backend/ --ignore-missing-imports

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://litlens:litlens@localhost:5432/litlens
          OPENAI_API_KEY: sk-test-fake-key-for-ci
          NCBI_API_KEY: fake-ncbi-key
          NCBI_EMAIL: test@test.com
          ENVIRONMENT: test
          USE_FAISS_FALLBACK: "false"
        run: |
          pytest tests/ -v --tb=short --ignore=tests/test_eval_gate.py -x

      - name: Run eval gate
        env:
          DATABASE_URL: postgresql+asyncpg://litlens:litlens@localhost:5432/litlens
          OPENAI_API_KEY: sk-test-fake-key-for-ci
          NCBI_API_KEY: fake-ncbi-key
          NCBI_EMAIL: test@test.com
          ENVIRONMENT: test
        run: |
          pytest tests/test_eval_gate.py -v || echo "Eval history not found  -  skipping gate on first run"

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t litlens-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t litlens-frontend .

