databases:
  - name: litlens-db
    databaseName: litlens
    plan: free
    postgresMajorVersion: 15

services:
  - type: web
    name: litlens-backend
    runtime: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: litlens-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: NCBI_API_KEY
        sync: false
      - key: NCBI_EMAIL
        sync: false
      - key: S2_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: USE_FAISS_FALLBACK
        value: "false"
    healthCheckPath: /health

  - type: web
    name: litlens-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          name: litlens-backend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL
      - key: ENVIRONMENT
        value: production
